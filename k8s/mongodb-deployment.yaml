apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  labels:
    app: hotelease-mongodb
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: hotelease-mongodb
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  labels:
    app: hotelease-mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotelease-mongodb
  template:
    metadata:
      labels:
        app: hotelease-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db
      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
